<script>

let logged=localStorage.getItem("logged")

if(logged){

document.getElementById("userPanel").innerHTML=
`
<h2>Zalogowany jako ${logged}</h2>
<button onclick="logout()">Wyloguj</button>
`

}

function logout(){

localStorage.removeItem("logged")
location.reload()

}
